[versions]
ktor = "3.4.2"
logging = "7.0.3"
logback = "1.5.32"

[bundles]
ktor = ["ktor-sockets"]
logging = ["kotlin-logging", "logback-classic"]

[libraries]
ktor-sockets = { group = "io.ktor", name = "ktor-network", version.ref="ktor" }
kotlin-logging = { group = "io.github.oshai", name = "kotlin-logging", version.ref = "logging" }
logback-classic = { group = "ch.qos.logback", name = "logback-classic", version.ref = "logback" }
